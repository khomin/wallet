info:
  name: gecko-prices-market
  type: http
  seq: 4

http:
  method: GET
  url: "{{coinGeckoUri}}/api/v3/coins/markets?vs_currency=usd"
  params:
    - name: vs_currency
      value: usd
      type: query
    - name: category
      value: tokenized-stock
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
