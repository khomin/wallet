info:
  name: coingecko-price-simple
  type: http
  seq: 3

http:
  method: GET
  url: "{{coinGeckoUri}}/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd"
  params:
    - name: ids
      value: bitcoin,ethereum
      type: query
    - name: vs_currencies
      value: usd
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
