info:
  name: protected
  type: folder
  seq: 2

request:
  auth:
    type: oauth2
    flow: authorization_code
    authorizationUrl: http://localhost:9090/realms/whale-tracker/protocol/openid-connect/auth
    accessTokenUrl: http://localhost:9090/realms/whale-tracker/protocol/openid-connect/token
    callbackUrl: http://localhost:8080
    credentials:
      clientId: "{{client-id}}"
      placement: body
    scope: whale-tracker-audience
    pkce: {}
    tokenConfig:
      id: whale-tracker-app
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
